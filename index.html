<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papaddy ✿ - Official Store</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #F3F0FF; 
    --main: #B197FC;
    --dark: #7048E8;
    --white: #FFFFFF;
    --pink: #FF87B2; /* สีชมพูเพิ่มเติมสำหรับเอฟเฟกต์ */
    --glow: rgba(177, 151, 252, 0.4);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Mitr', sans-serif; }

body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
}

/* --- 1. หน้า Loading Screen --- */
#loader {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    transition: opacity 0.5s ease;
}

.heart-loader {
    font-size: 60px;
    color: var(--pink);
    animation: heartBeat 1.2s infinite ease-in-out, heartRotate 2s infinite linear;
}

@keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
}

@keyframes heartRotate {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.3); }
    100% { transform: rotate(360deg) scale(1); }
}

/* --- 2. พื้นหลังคลื่นน้ำ (Animated Waves) --- */
.ocean { 
  height: 150px; width: 100%;
  position: fixed; bottom: 0; left: 0;
  background: transparent; z-index: -1;
}

.wave {
  background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; 
  position: absolute; bottom: 0;
  width: 6400px; height: 100%;
  animation: wave 7s cubic-bezier( 0.36, 0.45, 0.63, 0.53) infinite;
  transform: translate3d(0, 0, 0);
  opacity: 0.3;
}

@keyframes wave {
  0% { margin-left: 0; }
  100% { margin-left: -1600px; }
}

/* --- 3. ปรับปรุงหัวใจตอนคลิก --- */
.click-heart {
    position: absolute;
    color: var(--pink);
    font-size: 45px; /* ใหญ่ขึ้นตามคำขอ */
    text-shadow: 0 0 10px rgba(255, 135, 178, 0.8); /* เพิ่มแสงสีชมพู */
    pointer-events: none;
    animation: heartPop 0.8s ease-out forwards;
    z-index: 9999;
}

@keyframes heartPop {
    0% { transform: translate(-50%, -50%) scale(0.2) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -180%) scale(1.8) rotate(20deg); opacity: 0; }
}

.container {
    max-width: 500px; width: 100%;
    padding: 20px 15px 100px;
    position: relative; z-index: 1;
}

/* --- 4. ตกแต่งกรอบ (Section Decor) --- */
.section {
    background: var(--white);
    border-radius: 30px; /* มนขึ้น */
    padding: 25px 20px;
    margin-bottom: 25px;
    box-shadow: 0 10px 0px var(--main); /* เงาแบบหนาๆ สไตล์สติกเกอร์ */
    border: 3px solid var(--main);
    position: relative;
}

/* เพิ่มจุดกลมๆ มุมกรอบให้น่ารัก */
.section::before {
    content: '✿';
    position: absolute;
    top: -12px; right: 20px;
    background: var(--white);
    padding: 0 5px;
    color: var(--main);
    font-size: 20px;
}

.logo-wrapper {
    position: relative;
    width: 150px; height: 150px;
    margin: 0 auto 20px;
}

.logo {
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 5px solid #fff;
    overflow: hidden;
    box-shadow: 0 6px 20px var(--glow);
    z-index: 2;
}

.logo img { width: 100%; height: 100%; object-fit: cover; }

.btn {
    display: block; text-align: center;
    padding: 14px; border-radius: 20px;
    text-decoration: none; margin-top: 15px;
    font-weight: 500; transition: 0.3s;
    cursor: pointer;
}

.btn-main {
    background: var(--main);
    color: #fff;
    border-bottom: 4px solid var(--dark);
}

.btn-main:hover { transform: scale(1.02); filter: brightness(1.1); }

.price-row {
    display: flex; justify-content: space-between;
    margin-bottom: 10px; background: #F8F5FF;
    padding: 12px 15px; border-radius: 15px;
    border-left: 5px solid var(--pink);
}

.footer { text-align: center; margin-top: 30px; padding-bottom: 50px;}
</style>
</head>

<body>

<div id="loader">
    <div class="heart-loader">❤</div>
</div>

<div class="ocean">
  <div class="wave"></div>
  <div class="wave" style="bottom: 10px; opacity: 0.5; animation-duration: 10s;"></div>
</div>

<div class="container">
    <div class="section center" style="border:none; box-shadow:none; background:transparent;">
        <div class="logo-wrapper">
            <div class="logo"><img src="Messenger_creation_07B09451-EC95-4BD7-994C-EB1523158F98.jpeg" alt="Logo"></div>
        </div>
        <h1>Papaddy ✿</h1>
        <p>รับทำป้าย เเอพพรีเมี่ยม 24 Hours ˚˖𓍢ִ໋🦢˚</p>
    </div>

    <div class="section">
        <h2 style="text-align: center; margin-bottom: 15px;">✿ เงื่อนไขการสั่งงาน</h2>
        <div class="price-row"><span>1. รองานภายใน 24 ชม.</span></div>
        <div class="price-row"><span>2. ติดคิวรอ 1-2 วัน</span></div>
        <div class="price-row" style="border-left-color: var(--dark);"><span>3. งานเร่ง +60.-</span></div>
        <a href="https://docs.google.com/spreadsheets/d/1V0PWpH1MFnA2Jw686bdZR_-lXejP2eiEzp2rAGcYfOY/edit?usp=sharing" target="_blank" class="btn btn-main">เช็คคิวงานป้าย 📋</a>
    </div>

    <div class="section">
        <h2 style="text-align: center; margin-bottom: 15px;">♡ เมนูสั่งทำ</h2>
        <a href="#" class="btn btn-main">♡ รายละเอียดสั่งทำป้าย</a>
        <a href="#" class="btn btn-main" style="background: var(--pink); border-color: #e66a9a;">♡ สั่งเเอพพรีเมี่ยม</a>
    </div>

    <div class="footer">
        <a href="https://lin.ee/xbQgeBH" class="btn btn-main" style="border-radius: 50px;">สั่งงานทาง LINE 🎀</a>
        <p style="margin-top: 20px; font-size: 12px;">© 2026 Papaddy ✿</p>
    </div>
</div>

<script>
// ปิดหน้า Loading เมื่อโหลดเสร็จ
window.addEventListener('load', function() {
    const loader = document.getElementById('loader');
    setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 500);
    }, 1500); // ตั้งเวลาโชว์ Loading ไว้ 1.5 วิ เพื่อความสวยงาม
});

// หัวใจตอนคลิกแบบใหม่ ใหญ่สะใจ + สีชมพูฟุ้ง
function createClickHeart(e) {
    const heart = document.createElement('div');
    heart.className = 'click-heart';
    heart.innerText = '❤';

    let x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
    let y = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

    heart.style.left = x + 'px';
    heart.style.top = (y + window.scrollY) + 'px';

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 800);
}

document.addEventListener('click', createClickHeart);
document.addEventListener('touchstart', createClickHeart, {passive: true});
</script>

</body>
</html>
